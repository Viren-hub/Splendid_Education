# ══════════════════════════════════════════════════════════════════
#  Splendid Education — Nginx Configuration
#  Location on server: /etc/nginx/sites-available/splendid
#
#  This forwards ALL traffic from port 80 to Node.js on port 5000.
#  CloudFront sits in front of this EC2 and routes:
#    /api/* → EC2 (this server)
#    /*     → S3 bucket (Angular frontend)
# ══════════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;

    server_name _;   # Accept all hostnames / IP addresses

    # File upload limit (match Express 10kb limit)
    client_max_body_size 10m;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    300s;

    # ── Forward to Node.js ──────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # WebSocket support (future-proofing)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Preserve real client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }

    # ── Gzip compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml;

    # ── Security headers ────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ── Hide Nginx version ──────────────────────────────────────
    server_tokens off;

    # ── Health check for load balancers / CI ───────────────────
    location = /api/health {
        proxy_pass http://127.0.0.1:5000/api/health;
        access_log off;
    }
}
