services:
  - type: web
    name: splendid-education-api
    runtime: node
    buildCommand: npm install --no-audit --no-fund
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: DB_SYNC_ALTER
        value: false
